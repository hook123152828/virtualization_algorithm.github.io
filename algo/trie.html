<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Trie 字典樹 - 競程視覺化</title>
<style>
:root{--bg:#0f1117;--sf:#1a1d27;--sf2:#22263a;--ac:#7c6af7;--ac2:#56cfb2;--tx:#e8eaf6;--mu:#8b90a8;--bd:#2e3250;--gr:#56cfb2;--rd:#f66868;--yl:#faad49;--bl:#63b3ed;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;font-size:14px;}
.tb{display:flex;align-items:center;gap:.75rem;padding:.75rem 1.25rem;background:var(--sf);border-bottom:1px solid var(--bd);}
.tb-back{color:var(--mu);text-decoration:none;font-size:.85rem;padding:.3rem .6rem;border-radius:6px;border:1px solid var(--bd);}
.tb-back:hover{color:var(--tx);border-color:var(--ac);}
.tb-title{font-size:1.05rem;font-weight:700;background:linear-gradient(90deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tb-sub{font-size:.78rem;color:var(--mu);}
.layout{display:flex;flex:1;min-height:0;}
.left{width:300px;flex-shrink:0;border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;}
.right{flex:1;display:flex;flex-direction:column;}
.pnl{padding:1rem;border-bottom:1px solid var(--bd);}
.pnl-title{font-size:.72rem;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.7rem;}
.field{margin-bottom:.6rem;}
.field label{display:block;font-size:.78rem;color:var(--mu);margin-bottom:.22rem;}
input[type=text],textarea{width:100%;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:.45rem .7rem;border-radius:7px;font-size:.88rem;outline:none;font-family:monospace;}
input[type=text]:focus,textarea:focus{border-color:var(--ac);}
textarea{resize:vertical;min-height:60px;}
.btn{padding:.4rem .85rem;border-radius:7px;border:1px solid var(--bd);background:var(--sf2);color:var(--tx);font-size:.82rem;cursor:pointer;transition:all .15s;}
.btn:hover:not(:disabled){border-color:var(--ac);background:rgba(124,106,247,.15);}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-run{background:var(--ac);border-color:var(--ac);font-weight:600;width:100%;margin-top:.4rem;}
.btn-run:hover:not(:disabled){opacity:.85;}
.btn-play{background:rgba(86,207,178,.12);border-color:var(--ac2);color:var(--ac2);}
.step-box{background:var(--sf2);border-radius:8px;padding:.75rem .9rem;font-size:.85rem;line-height:1.65;min-height:80px;}
.step-cnt{margin-top:.4rem;font-size:.72rem;color:var(--mu);text-align:right;}
.ctrl{display:flex;align-items:center;gap:.5rem;padding:.65rem 1rem;border-top:1px solid var(--bd);background:var(--sf);flex-wrap:wrap;}
.sp-lbl{font-size:.75rem;color:var(--mu);}
input[type=range]{width:70px;accent-color:var(--ac);}
.viz{flex:1;padding:1.25rem;overflow:auto;}
svg.gsvg{background:var(--sf2);border-radius:10px;border:1px solid var(--bd);}
</style>
</head>
<body>
<div class="tb">
  <a class="tb-back" href="../index.html">← 返回</a>
  <div><div class="tb-title">Trie 字典樹</div><div class="tb-sub">#37 · 插入與搜尋，O(|w|)</div></div>
</div>
<div class="layout">
  <div class="left">
    <div class="pnl">
      <div class="pnl-title">輸入</div>
      <div class="field"><label>插入單字（每行一個，最多 8 個，每字 ≤ 6 字元）</label>
        <textarea id="words">apple
app
apply
bat
ball
base</textarea></div>
      <div class="field"><label>搜尋單字（每行一個，可選）</label>
        <textarea id="queries" style="min-height:40px">app
cat</textarea></div>
      <button class="btn btn-run" id="run-btn">▶ 執行</button>
    </div>
    <div class="pnl" style="flex:1">
      <div class="pnl-title">步驟說明</div>
      <div class="step-box" id="step-info">請按「執行」開始</div>
      <div class="step-cnt" id="step-cnt">— / —</div>
    </div>
  </div>
  <div class="right">
    <div class="viz" id="viz"></div>
    <div class="ctrl">
      <button class="btn" id="btn-first" disabled>|◀</button>
      <button class="btn" id="btn-prev" disabled>◀</button>
      <button class="btn btn-play" id="btn-play" disabled>▶ 自動</button>
      <button class="btn" id="btn-next" disabled>▶</button>
      <button class="btn" id="btn-last" disabled>▶|</button>
      <button class="btn" id="btn-reset">↺ 重置</button>
      <span class="sp-lbl">速度</span>
      <input type="range" id="speed" min="1" max="10" value="5">
    </div>
  </div>
</div>
<script>
const steps=[];let cur=-1,autoTimer=null;
function getDelay(){return 1200-document.getElementById('speed').value*110;}
function updateCtrl(){
  const m=steps.length;
  ['btn-first','btn-prev'].forEach(id=>document.getElementById(id).disabled=cur<=0);
  ['btn-next','btn-last'].forEach(id=>document.getElementById(id).disabled=cur>=m-1);
  document.getElementById('btn-play').disabled=m===0;
  document.getElementById('step-cnt').textContent=m>0?`${cur+1} / ${m}`:'— / —';
}
function goTo(i){
  if(i<0||i>=steps.length)return;
  cur=i;document.getElementById('step-info').innerHTML=steps[cur].desc;
  render(steps[cur]);updateCtrl();
}
document.getElementById('btn-first').onclick=()=>goTo(0);
document.getElementById('btn-prev').onclick=()=>goTo(cur-1);
document.getElementById('btn-next').onclick=()=>goTo(cur+1);
document.getElementById('btn-last').onclick=()=>goTo(steps.length-1);
document.getElementById('btn-play').onclick=function(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;this.textContent='▶ 自動';}
  else{if(cur>=steps.length-1)goTo(0);this.textContent='⏸ 暫停';
    autoTimer=setInterval(()=>{if(cur>=steps.length-1){clearInterval(autoTimer);autoTimer=null;document.getElementById('btn-play').textContent='▶ 自動';}else goTo(cur+1);},getDelay());}
};
document.getElementById('btn-reset').onclick=()=>{
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;}
  document.getElementById('btn-play').textContent='▶ 自動';
  steps.length=0;cur=-1;document.getElementById('viz').innerHTML='';
  document.getElementById('step-info').textContent='請按「執行」開始';updateCtrl();
};

// Trie node structure
function newNode(){return{children:{},isEnd:false,id:0,label:''};}

function layoutTrie(root){
  // BFS to assign positions
  const W=500,H=320,pad=30;
  const queue=[{node:root,depth:0,sibIdx:0,sibCount:1,parentX:W/2}];
  const positions=new Map();
  const byDepth={};
  // First pass: count nodes per depth
  const allNodes=[];function dfs(n,d){allNodes.push({n,d});Object.values(n.children).forEach(c=>dfs(c,d+1));}
  dfs(root,0);
  const depthCounts={};allNodes.forEach(({n,d})=>{depthCounts[d]=(depthCounts[d]||[]); depthCounts[d].push(n);});
  const maxDepth=Math.max(...Object.keys(depthCounts).map(Number));
  // DFS-based x assignment (inorder leaf numbering)
  let leafIdx=0;
  function assignLeaf(node){
    const keys=Object.keys(node.children).sort();
    if(keys.length===0){node._leaf=leafIdx++;return;}
    keys.forEach(k=>assignLeaf(node.children[k]));
    node._leaf=node.children[Object.keys(node.children).sort()[0]]._leaf+(keys.reduce((s,k)=>s+(node.children[k]._leaf||0),0)-node.children[Object.keys(node.children).sort()[0]]._leaf)/2;
    // Re-center
    const firstLeaf=node.children[Object.keys(node.children).sort()[0]]._leaf;
    const lastLeaf=node.children[Object.keys(node.children).sort()[keys.length-1]]._leaf;
    node._leaf=(firstLeaf+lastLeaf)/2;
  }
  assignLeaf(root);
  function assignPos(node,depth){
    const xStep=leafIdx>0?(W-2*pad)/leafIdx:W;
    const x=pad+node._leaf*xStep+(xStep/2);
    const yStep=maxDepth>0?(H-2*pad)/maxDepth:50;
    const y=pad+depth*yStep;
    positions.set(node,{x,y});
    Object.values(node.children).forEach(c=>assignPos(c,depth+1));
  }
  assignPos(root,0);
  return{positions,W,H};
}

function renderTrie(root,hlNodes,hlEdges,failNodes){
  const{positions,W,H}=layoutTrie(root);
  let svg=`<svg class="gsvg" viewBox="0 0 ${W} ${H}" style="width:${W}px;height:${H}px">`;
  // Draw edges
  function drawEdges(node){
    const pos=positions.get(node);
    Object.entries(node.children).sort().forEach(([c,child])=>{
      const cpos=positions.get(child);
      const isHl=hlEdges&&hlEdges.has(child.id);
      svg+=`<line x1="${pos.x}" y1="${pos.y}" x2="${cpos.x}" y2="${cpos.y}" stroke="${isHl?'#faad49':'#2e3250'}" stroke-width="${isHl?2.5:1.5}"/>`;
      const mx=(pos.x+cpos.x)/2,my=(pos.y+cpos.y)/2;
      svg+=`<text x="${mx+4}" y="${my}" font-size="10" fill="${isHl?'#faad49':'var(--mu)'}" font-weight="${isHl?'bold':'normal'}">${c}</text>`;
      drawEdges(child);
    });
  }
  drawEdges(root);
  // Draw nodes
  function drawNodes(node){
    const pos=positions.get(node);if(!pos)return;
    const isHl=hlNodes&&hlNodes.has(node.id);
    const isFail=failNodes&&failNodes.has(node.id);
    const fill=isHl?'rgba(250,173,73,.4)':isFail?'rgba(246,104,104,.2)':node.isEnd?'rgba(86,207,178,.25)':'var(--sf)';
    const stroke=isHl?'#faad49':isFail?'var(--rd)':node.isEnd?'var(--gr)':'var(--bd)';
    svg+=`<circle cx="${pos.x}" cy="${pos.y}" r="14" fill="${fill}" stroke="${stroke}" stroke-width="${isHl||node.isEnd?2.5:1.5}"/>`;
    svg+=`<text x="${pos.x}" y="${pos.y+4}" text-anchor="middle" font-size="9" fill="${isHl?'#faad49':node.isEnd?'var(--gr)':'var(--mu)'}">${node.label}</text>`;
    Object.values(node.children).forEach(c=>drawNodes(c));
  }
  drawNodes(root);
  svg+='</svg>';
  return svg;
}

document.getElementById('run-btn').onclick=function(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;document.getElementById('btn-play').textContent='▶ 自動';}
  steps.length=0;cur=-1;
  const words=document.getElementById('words').value.trim().split('\n').map(s=>s.trim().toLowerCase()).filter(s=>s).slice(0,8).map(s=>s.slice(0,6));
  const queries=document.getElementById('queries').value.trim().split('\n').map(s=>s.trim().toLowerCase()).filter(s=>s);
  const root=newNode();root.label='root';root.id=0;let nodeId=1;
  let curRoot={...root,children:{}};// deep copy
  function deepCopy(n){const c=newNode();c.isEnd=n.isEnd;c.id=n.id;c.label=n.label;Object.entries(n.children).forEach(([k,v])=>c.children[k]=deepCopy(v));return c;}
  // Work with actual root
  steps.push({root:deepCopy(root),hlNodes:new Set(),hlEdges:new Set(),desc:`<b>初始化 Trie</b><br>僅有根節點，開始插入單字。`});
  words.forEach(word=>{
    let node=root;const hlNodes=new Set([0]);const hlEdges=new Set();
    steps.push({root:deepCopy(root),hlNodes:new Set([0]),hlEdges:new Set(),desc:`<b>插入 "${word}"</b><br>從根節點出發。`});
    for(let i=0;i<word.length;i++){
      const c=word[i];const isNew=!node.children[c];
      if(!node.children[c]){node.children[c]=newNode();node.children[c].id=nodeId++;node.children[c].label=c;}
      node=node.children[c];hlNodes.add(node.id);hlEdges.add(node.id);
      steps.push({root:deepCopy(root),hlNodes:new Set(hlNodes),hlEdges:new Set(hlEdges),desc:`<b>插入 "${word}"，字元 '${c}'</b><br>${isNew?`新建節點（id=${node.id}）`:`節點已存在（id=${node.id}）`}，路徑：${word.slice(0,i+1)}`});
    }
    node.isEnd=true;
    steps.push({root:deepCopy(root),hlNodes:new Set(hlNodes),hlEdges:new Set(hlEdges),desc:`<b>"${word}" 插入完成！</b><br>標記終止節點（雙圓圈）。`});
  });
  // Search
  queries.forEach(word=>{
    let node=root;const hlNodes=new Set([0]);const hlEdges=new Set();let found=true;
    steps.push({root:deepCopy(root),hlNodes:new Set([0]),hlEdges:new Set(),desc:`<b>搜尋 "${word}"</b><br>從根節點出發。`});
    for(let i=0;i<word.length;i++){
      const c=word[i];
      if(!node.children[c]){found=false;
        steps.push({root:deepCopy(root),hlNodes:new Set(hlNodes),hlEdges:new Set(hlEdges),failNodes:new Set(hlNodes),desc:`<b>搜尋 "${word}" ❌</b><br>字元 '${c}' 不存在，搜尋失敗！`});break;}
      node=node.children[c];hlNodes.add(node.id);hlEdges.add(node.id);
      steps.push({root:deepCopy(root),hlNodes:new Set(hlNodes),hlEdges:new Set(hlEdges),desc:`<b>搜尋 "${word}"，字元 '${c}'</b><br>路徑：${word.slice(0,i+1)}`});
    }
    if(found){
      const res=node.isEnd?'✅ 找到（完整單字）':'⚠ 是前綴，但非完整單字';
      steps.push({root:deepCopy(root),hlNodes:new Set(hlNodes),hlEdges:new Set(hlEdges),desc:`<b>搜尋 "${word}" ${res}</b>`});
    }
  });
  steps.push({root:deepCopy(root),hlNodes:new Set(),hlEdges:new Set(),desc:`<b>所有操作完成！</b><br>Trie 包含 ${words.length} 個單字。`});
  goTo(0);
};

function render(s){
  const{root,hlNodes,hlEdges,failNodes}=s;
  document.getElementById('viz').innerHTML=renderTrie(root,hlNodes,hlEdges,failNodes);
}
updateCtrl();
</script>
</body></html>
