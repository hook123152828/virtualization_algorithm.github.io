<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>樹的重心 - 競程視覺化</title>
<style>
:root{--bg:#0f1117;--sf:#1a1d27;--sf2:#22263a;--ac:#7c6af7;--ac2:#56cfb2;--tx:#e8eaf6;--mu:#8b90a8;--bd:#2e3250;--gr:#56cfb2;--rd:#f66868;--yl:#faad49;--bl:#63b3ed;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;font-size:14px;}
.tb{display:flex;align-items:center;gap:.75rem;padding:.75rem 1.25rem;background:var(--sf);border-bottom:1px solid var(--bd);}
.tb-back{color:var(--mu);text-decoration:none;font-size:.85rem;padding:.3rem .6rem;border-radius:6px;border:1px solid var(--bd);}
.tb-back:hover{color:var(--tx);border-color:var(--ac);}
.tb-title{font-size:1.05rem;font-weight:700;background:linear-gradient(90deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tb-sub{font-size:.78rem;color:var(--mu);}
.layout{display:flex;flex:1;min-height:0;}
.left{width:300px;flex-shrink:0;border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;}
.right{flex:1;display:flex;flex-direction:column;}
.pnl{padding:1rem;border-bottom:1px solid var(--bd);}
.pnl-title{font-size:.72rem;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.7rem;}
.field{margin-bottom:.6rem;}
.field label{display:block;font-size:.78rem;color:var(--mu);margin-bottom:.22rem;}
input[type=number],textarea{width:100%;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:.45rem .7rem;border-radius:7px;font-size:.88rem;outline:none;}
input[type=number]:focus,textarea:focus{border-color:var(--ac);}
textarea{font-family:monospace;resize:vertical;min-height:70px;}
.btn{padding:.4rem .85rem;border-radius:7px;border:1px solid var(--bd);background:var(--sf2);color:var(--tx);font-size:.82rem;cursor:pointer;transition:all .15s;}
.btn:hover:not(:disabled){border-color:var(--ac);background:rgba(124,106,247,.15);}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-run{background:var(--ac);border-color:var(--ac);font-weight:600;width:100%;margin-top:.4rem;}
.btn-run:hover:not(:disabled){opacity:.85;}
.btn-play{background:rgba(86,207,178,.12);border-color:var(--ac2);color:var(--ac2);}
.step-box{background:var(--sf2);border-radius:8px;padding:.75rem .9rem;font-size:.85rem;line-height:1.65;min-height:80px;}
.step-cnt{margin-top:.4rem;font-size:.72rem;color:var(--mu);text-align:right;}
.ctrl{display:flex;align-items:center;gap:.5rem;padding:.65rem 1rem;border-top:1px solid var(--bd);background:var(--sf);flex-wrap:wrap;}
.sp-lbl{font-size:.75rem;color:var(--mu);}
input[type=range]{width:70px;accent-color:var(--ac);}
.viz{flex:1;padding:1.25rem;overflow:auto;display:flex;gap:1rem;flex-wrap:wrap;}
svg.gsvg{background:var(--sf2);border-radius:10px;border:1px solid var(--bd);}
.side-table{background:var(--sf2);border-radius:8px;padding:.75rem;border:1px solid var(--bd);min-width:150px;}
.dt-title{font-size:.72rem;color:var(--mu);font-weight:600;margin-bottom:.5rem;}
.sz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:.4rem;}
.sz-cell{background:var(--sf);border:1.5px solid var(--bd);border-radius:6px;padding:.3rem;text-align:center;font-size:.8rem;}
.sz-cell .nid{font-weight:700;font-family:monospace;}
.sz-cell .sv{color:var(--ac2);font-size:.75rem;}
.sz-cell.centroid{border-color:var(--gr);background:rgba(86,207,178,.2);}
.sz-cell.cur{border-color:var(--yl);}
</style>
</head>
<body>
<div class="tb">
  <a class="tb-back" href="../index.html">← 返回</a>
  <div><div class="tb-title">樹的重心</div><div class="tb-sub">#20 · DFS 計算子樹大小，O(n)</div></div>
</div>
<div class="layout">
  <div class="left">
    <div class="pnl">
      <div class="pnl-title">輸入</div>
      <div class="field"><label>節點數 n（最多 10）</label><input type="number" id="n-in" value="7" min="2" max="10"></div>
      <div class="field"><label>無向樹邊（每行 u v）</label>
        <textarea id="edges">1 2
1 3
2 4
2 5
3 6
3 7</textarea></div>
      <button class="btn btn-run" id="run-btn">▶ 執行</button>
    </div>
    <div class="pnl" style="flex:1">
      <div class="pnl-title">步驟說明</div>
      <div class="step-box" id="step-info">請按「執行」開始</div>
      <div class="step-cnt" id="step-cnt">— / —</div>
    </div>
  </div>
  <div class="right">
    <div class="viz" id="viz"></div>
    <div class="ctrl">
      <button class="btn" id="btn-first" disabled>|◀</button>
      <button class="btn" id="btn-prev" disabled>◀</button>
      <button class="btn btn-play" id="btn-play" disabled>▶ 自動</button>
      <button class="btn" id="btn-next" disabled>▶</button>
      <button class="btn" id="btn-last" disabled>▶|</button>
      <button class="btn" id="btn-reset">↺ 重置</button>
      <span class="sp-lbl">速度</span>
      <input type="range" id="speed" min="1" max="10" value="5">
    </div>
  </div>
</div>
<script>
const steps=[];let cur=-1,autoTimer=null;
function getDelay(){return 1200-document.getElementById('speed').value*110;}
function updateCtrl(){
  const m=steps.length;
  ['btn-first','btn-prev'].forEach(id=>document.getElementById(id).disabled=cur<=0);
  ['btn-next','btn-last'].forEach(id=>document.getElementById(id).disabled=cur>=m-1);
  document.getElementById('btn-play').disabled=m===0;
  document.getElementById('step-cnt').textContent=m>0?`${cur+1} / ${m}`:'— / —';
}
function goTo(i){
  if(i<0||i>=steps.length)return;
  cur=i;document.getElementById('step-info').innerHTML=steps[cur].desc;
  render(steps[cur]);updateCtrl();
}
document.getElementById('btn-first').onclick=()=>goTo(0);
document.getElementById('btn-prev').onclick=()=>goTo(cur-1);
document.getElementById('btn-next').onclick=()=>goTo(cur+1);
document.getElementById('btn-last').onclick=()=>goTo(steps.length-1);
document.getElementById('btn-play').onclick=function(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;this.textContent='▶ 自動';}
  else{if(cur>=steps.length-1)goTo(0);this.textContent='⏸ 暫停';
    autoTimer=setInterval(()=>{if(cur>=steps.length-1){clearInterval(autoTimer);autoTimer=null;document.getElementById('btn-play').textContent='▶ 自動';}else goTo(cur+1);},getDelay());}
};
document.getElementById('btn-reset').onclick=()=>{
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;}
  document.getElementById('btn-play').textContent='▶ 自動';
  steps.length=0;cur=-1;document.getElementById('viz').innerHTML='';
  document.getElementById('step-info').textContent='請按「執行」開始';updateCtrl();
};

function treeLayout(n,adj,root){
  const pos={};const level={};const queue=[root];level[root]=0;const visited=new Set([root]);
  const byLevel={};
  while(queue.length){const u=queue.shift();(byLevel[level[u]]||(byLevel[level[u]]=[])).push(u);for(const v of adj[u])if(!visited.has(v)){visited.add(v);level[v]=level[u]+1;queue.push(v);}}
  const W=480,H=280,pad=40;
  Object.entries(byLevel).forEach(([lv,nodes])=>{
    const y=pad+parseInt(lv)*(H-2*pad)/Math.max(1,(Object.keys(byLevel).length-1||1));
    const xStep=(W-2*pad)/(nodes.length+1);
    nodes.forEach((u,i)=>{pos[u]={x:pad+xStep*(i+1),y};});
  });
  return{pos,W,H};
}

function render(s){
  const{n,undirEdges,adjList,sz,curNode,centroid}=s;
  const{pos,W,H}=treeLayout(n,adjList,1);
  let svg=`<svg class="gsvg" viewBox="0 0 ${W} ${H}" style="width:${W}px;height:${H}px">`;
  undirEdges.forEach(e=>{
    const from=pos[e.u],to=pos[e.v];if(!from||!to)return;
    svg+=`<line x1="${from.x}" y1="${from.y}" x2="${to.x}" y2="${to.y}" stroke="#2e3250" stroke-width="1.5"/>`;
  });
  for(let i=1;i<=n;i++){
    const p=pos[i];if(!p)continue;
    const isCentroid=centroid&&centroid.includes(i);const isCur=i===curNode;
    const fill=isCentroid?'rgba(86,207,178,.3)':isCur?'rgba(250,173,73,.3)':'var(--sf)';
    const stroke=isCentroid?'var(--gr)':isCur?'#faad49':'var(--bd)';
    svg+=`<circle cx="${p.x}" cy="${p.y}" r="16" fill="${fill}" stroke="${stroke}" stroke-width="${isCentroid||isCur?2.5:1.5}"/>`;
    svg+=`<text x="${p.x}" y="${p.y+5}" text-anchor="middle" font-size="11" font-weight="bold" fill="${isCentroid?'var(--gr)':isCur?'#faad49':'var(--tx)'}">${i}</text>`;
    if(sz&&sz[i]!==undefined)svg+=`<text x="${p.x}" y="${p.y+30}" text-anchor="middle" font-size="9" fill="var(--ac2)">sz=${sz[i]}</text>`;
  }
  svg+='</svg>';
  let st=`<div class="side-table"><div class="dt-title">子樹大小 sz[]</div><div class="sz-grid">`;
  for(let i=1;i<=n;i++){
    const isCen=centroid&&centroid.includes(i);const isCur=i===curNode;
    st+=`<div class="sz-cell ${isCen?'centroid':''} ${isCur?'cur':''}"><div class="nid">${i}</div><div class="sv">${sz&&sz[i]!==undefined?sz[i]:'?'}</div></div>`;
  }
  st+='</div>';
  if(centroid&&centroid.length)st+=`<div style="margin-top:.6rem;font-size:.82rem;color:var(--gr)">重心：<b>${centroid.join(', ')}</b></div>`;
  st+='</div>';
  document.getElementById('viz').innerHTML=svg+st;
}

document.getElementById('run-btn').onclick=function(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;document.getElementById('btn-play').textContent='▶ 自動';}
  steps.length=0;cur=-1;
  const n=Math.min(10,Math.max(2,parseInt(document.getElementById('n-in').value)||7));
  const undirEdges=[];const adjFull=Array.from({length:n+1},()=>[]);
  document.getElementById('edges').value.trim().split('\n').forEach(line=>{
    const p=line.trim().split(/\s+/);
    if(p.length>=2){const u=parseInt(p[0]),v=parseInt(p[1]);if(u>=1&&u<=n&&v>=1&&v<=n){undirEdges.push({u,v});adjFull[u].push(v);adjFull[v].push(u);}}
  });
  const sz=new Array(n+1).fill(0);const centroid=[];
  // DFS from root=1 iteratively
  const dfsOrder=[];const parent=new Array(n+1).fill(-1);
  const stack=[1];const visited=new Set([1]);
  while(stack.length){const u=stack.pop();dfsOrder.push(u);for(const v of adjFull[u])if(!visited.has(v)){visited.add(v);parent[v]=u;stack.push(v);}}
  // Process in reverse order (leaves first)
  function snap(d={}){return{n,undirEdges,adjList:adjFull,sz:[...sz],centroid:[...centroid],...d};}
  steps.push({...snap(),desc:`<b>初始化</b><br>從根節點 1 出發，DFS 後序計算每個節點的子樹大小。<br>重心定義：刪除該節點後，所有子樹大小 ≤ n/2。`});
  for(let i=dfsOrder.length-1;i>=0;i--){
    const u=dfsOrder[i];sz[u]=1;
    for(const v of adjFull[u])if(parent[v]===u)sz[u]+=sz[v];
    steps.push({...snap({curNode:u}),desc:`<b>計算 sz[${u}]</b><br>子樹大小 = ${sz[u]}（含自身）`});
  }
  // Find centroid
  for(let i=1;i<=n;i++){
    const maxSub=Math.max(n-sz[i],...adjFull[i].filter(v=>parent[v]===i).map(v=>sz[v]));
    if(maxSub<=Math.floor(n/2))centroid.push(i);
  }
  steps.push({...snap(),desc:`<b>尋找重心</b><br>重心條件：刪除後最大子樹 ≤ ⌊n/2⌋=${Math.floor(n/2)}<br>重心：<b>${centroid.join(', ')}</b>`});
  goTo(0);
};
updateCtrl();
</script>
</body></html>
