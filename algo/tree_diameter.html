<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>樹的直徑 - 競程視覺化</title>
<style>
:root{--bg:#0f1117;--sf:#1a1d27;--sf2:#22263a;--ac:#7c6af7;--ac2:#56cfb2;--tx:#e8eaf6;--mu:#8b90a8;--bd:#2e3250;--gr:#56cfb2;--rd:#f66868;--yl:#faad49;--bl:#63b3ed;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:14px;}
.tb{display:flex;align-items:center;gap:.75rem;padding:.75rem 1.25rem;background:var(--sf);border-bottom:1px solid var(--bd);}
.tb-back{color:var(--mu);text-decoration:none;font-size:.85rem;padding:.3rem .6rem;border-radius:6px;border:1px solid var(--bd);}
.tb-back:hover{color:var(--tx);border-color:var(--ac);}
.tb-title{font-size:1.05rem;font-weight:700;background:linear-gradient(90deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tb-sub{font-size:.78rem;color:var(--mu);}
.layout{display:flex;flex:1;min-height:0;}
.left{width:300px;flex-shrink:0;border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;}
.right{flex:1;display:flex;flex-direction:column;}
.pnl{padding:1rem;border-bottom:1px solid var(--bd);}
.pnl-title{font-size:.72rem;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.7rem;}
.field{margin-bottom:.6rem;}
.field label{display:block;font-size:.78rem;color:var(--mu);margin-bottom:.22rem;}
input[type=number],textarea{width:100%;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:.45rem .7rem;border-radius:7px;font-size:.88rem;outline:none;}
input[type=number]:focus,textarea:focus{border-color:var(--ac);}
textarea{font-family:monospace;resize:vertical;min-height:70px;}
.btn{padding:.4rem .85rem;border-radius:7px;border:1px solid var(--bd);background:var(--sf2);color:var(--tx);font-size:.82rem;cursor:pointer;transition:all .15s;}
.btn:hover:not(:disabled){border-color:var(--ac);background:rgba(124,106,247,.15);}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-run{background:var(--ac);border-color:var(--ac);font-weight:600;width:100%;margin-top:.4rem;}
.btn-run:hover:not(:disabled){opacity:.85;}
.btn-play{background:rgba(86,207,178,.12);border-color:var(--ac2);color:var(--ac2);}
.step-box{background:var(--sf2);border-radius:8px;padding:.75rem .9rem;font-size:.85rem;line-height:1.65;min-height:80px;}
.step-cnt{margin-top:.4rem;font-size:.72rem;color:var(--mu);text-align:right;}
.ctrl{display:flex;align-items:center;gap:.5rem;padding:.65rem 1rem;border-top:1px solid var(--bd);background:var(--sf);flex-wrap:wrap;}
.sp-lbl{font-size:.75rem;color:var(--mu);}
input[type=range]{width:70px;accent-color:var(--ac);}
.viz{flex:1;padding:1.25rem;overflow:auto;}
svg.gsvg{background:var(--sf2);border-radius:10px;border:1px solid var(--bd);}

.algo-panel{width:280px;flex-shrink:0;border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;}
.algo-desc{font-size:.83rem;line-height:1.7;color:var(--tx);opacity:.9;}
.tag-list{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.55rem;}
.tag{font-size:.7rem;padding:.18rem .52rem;border-radius:99px;background:rgba(124,106,247,.18);color:var(--ac);border:1px solid rgba(124,106,247,.35);}
.pseudo-block{background:var(--sf2);border-radius:8px;padding:.6rem .75rem;font-family:'Cascadia Code','Fira Code',monospace;font-size:.78rem;line-height:1.75;border:1px solid var(--bd);}
.ps-line{padding:.05rem .4rem;border-radius:4px;transition:all .18s;border-left:2px solid transparent;cursor:default;}
.ps-indent{padding-left:1.4em;}
.ps-indent2{padding-left:2.8em;}
.ps-line.active{background:rgba(124,106,247,.22);color:var(--tx);border-left-color:var(--ac);font-weight:600;}
.ps-line.dim{opacity:.28;}
.ps-kw{color:#ff79c6;}
.ps-cm{color:#6272a4;font-size:.72rem;}
.complexity-row{display:flex;justify-content:space-between;font-size:.82rem;gap:.5rem;}
.complexity-row span{background:var(--sf2);border-radius:6px;padding:.35rem .6rem;flex:1;text-align:center;border:1px solid var(--bd);}
.complexity-row b{color:var(--ac2);}
.ps-legend{display:flex;gap:.7rem;flex-wrap:wrap;margin-top:.5rem;font-size:.7rem;color:var(--mu);}
.ps-legend span::before{content:'■ ';color:var(--ac);}
</style>
</head>
<body>
<div class="tb">
  <a class="tb-back" href="../index.html">← 返回</a>
  <div><div class="tb-title">樹的直徑</div><div class="tb-sub">#19 · 兩次 BFS/DFS，O(n)</div></div>
</div>
<div class="layout">
  <div class="left">
    <div class="pnl">
      <div class="pnl-title">輸入</div>
      <div class="field"><label>節點數 n（最多 10）</label><input type="number" id="n-in" value="8" min="2" max="10"></div>
      <div class="field"><label>無向樹邊（每行 u v w，w 可省略=1）</label>
        <textarea id="edges">1 2
1 3
2 4
2 5
3 6
3 7
6 8</textarea></div>
      <button class="btn" id="rand-btn" style="width:100%;margin-bottom:.3rem;">&#127922; 隨機生成</button>
      <button class="btn btn-run" id="run-btn">▶ 執行</button>
    </div>
    <div class="pnl" style="flex:1">
      <div class="pnl-title">步驟說明</div>
      <div class="step-box" id="step-info">請按「執行」開始</div>
      <div class="step-cnt" id="step-cnt">— / —</div>
    </div>
  </div>
  <div class="right">
    <div class="viz" id="viz"></div>
    <div class="ctrl">
      <button class="btn" id="btn-first" disabled>|◀</button>
      <button class="btn" id="btn-prev" disabled>◀</button>
      <button class="btn btn-play" id="btn-play" disabled>▶ 自動</button>
      <button class="btn" id="btn-next" disabled>▶</button>
      <button class="btn" id="btn-last" disabled>▶|</button>
      <button class="btn" id="btn-reset">↺ 重置</button>
      <span class="sp-lbl">速度</span>
      <input type="range" id="speed" min="1" max="10" value="5">
    </div>
  </div>
<div class="algo-panel">
  <div class="pnl">
    <div class="pnl-title">演算法原理</div>
    <div class="algo-desc">兩次 BFS/DFS：第一次從任意點找最遠點 u，第二次從 u 出發找最遠點 v，u-v 路徑即為直徑。</div>
    <div class="tag-list"><span class="tag">樹</span><span class="tag">直徑</span><span class="tag">BFS/DFS</span></div>
  </div>
  <div class="pnl">
    <div class="pnl-title">虛擬碼</div>
    <div class="pseudo-block" id="pseudo-main">
        <div class="ps-line" id="l0"><span class='ps-kw'>BFS1</span>: 從任意點 s 出發</div>
        <div class="ps-line ps-indent" id="l1">找距離最遠的節點 u</div>
        <div class="ps-line" id="l2"><span class='ps-kw'>BFS2</span>: 從 u 出發</div>
        <div class="ps-line ps-indent" id="l3">找距離最遠的節點 v</div>
        <div class="ps-line ps-indent" id="l4">diameter = dist[v]</div>
        <div class="ps-line" id="l5"><span class='ps-kw'>return</span> diameter  <span class='ps-cm'>// u-v 路徑</span></div>
    </div>
      <div class="ps-legend"><span>當前執行行</span></div>
  </div>
  <div class="pnl">
    <div class="pnl-title">複雜度</div>
    <div class="complexity-row"><span>時間 <b>O(n)</b></span><span>空間 <b>O(n)</b></span></div>
  </div>
  <div class="pnl" style="flex:1">
    <div class="pnl-title">使用時機</div>
    <div class="algo-desc">• 樹的最長路徑<br>• 路徑中心點（直徑中點）<br>• 樹形DP驗證<br></div>
  </div>
</div>
</div>
<script>
const steps=[];let cur=-1,autoTimer=null;
function getDelay(){return 1200-document.getElementById('speed').value*110;}
function updateCtrl(){
  const m=steps.length;
  ['btn-first','btn-prev'].forEach(id=>document.getElementById(id).disabled=cur<=0);
  ['btn-next','btn-last'].forEach(id=>document.getElementById(id).disabled=cur>=m-1);
  document.getElementById('btn-play').disabled=m===0;
  document.getElementById('step-cnt').textContent=m>0?`${cur+1} / ${m}`:'— / —';
}
function goTo(i){
  if(i<0||i>=steps.length)return;
  cur=i;document.getElementById('step-info').innerHTML=steps[cur].desc;
  render(steps[cur]);highlightPhase(steps[cur].phase||'');updateCtrl();
}
document.getElementById('btn-first').onclick=()=>goTo(0);
document.getElementById('btn-prev').onclick=()=>goTo(cur-1);
document.getElementById('btn-next').onclick=()=>goTo(cur+1);
document.getElementById('btn-last').onclick=()=>goTo(steps.length-1);
document.getElementById('btn-play').onclick=function(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;this.textContent='▶ 自動';}
  else{if(cur>=steps.length-1)goTo(0);this.textContent='⏸ 暫停';
    autoTimer=setInterval(()=>{if(cur>=steps.length-1){clearInterval(autoTimer);autoTimer=null;document.getElementById('btn-play').textContent='▶ 自動';}else goTo(cur+1);},getDelay());}
};
document.getElementById('btn-reset').onclick=()=>{
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;}
  document.getElementById('btn-play').textContent='▶ 自動';
  steps.length=0;cur=-1;document.getElementById('viz').innerHTML='';
  document.getElementById('step-info').textContent='請按「執行」開始';highlightPhase('');updateCtrl();
};

// Layout: place root at top, BFS for levels
function treeLayout(n,adj,root){
  const pos={};const level={};const queue=[root];level[root]=0;const visited=new Set([root]);
  const byLevel={};
  while(queue.length){
    const u=queue.shift();
    (byLevel[level[u]]||(byLevel[level[u]]=[])).push(u);
    for(const{v}of adj[u])if(!visited.has(v)){visited.add(v);level[v]=level[u]+1;queue.push(v);}
  }
  const W=500,H=280,pad=40;
  Object.entries(byLevel).forEach(([lv,nodes])=>{
    const y=pad+parseInt(lv)*(H-2*pad)/Math.max(1,Object.keys(byLevel).length-1||1);
    const xStep=(W-2*pad)/(nodes.length+1);
    nodes.forEach((u,i)=>{pos[u]={x:pad+xStep*(i+1),y};});
  });
  return{pos,W,H};
}

function render(s){
  const{n,edges,adj,curNodes,distArr,phase,diamPath}=s;
  const root=1;
  const{pos,W,H}=treeLayout(n,adj,root);
  const diamSet=new Set(diamPath||[]);
  const diamEdgeSet=new Set();
  if(diamPath)for(let i=0;i<diamPath.length-1;i++)diamEdgeSet.add(`${Math.min(diamPath[i],diamPath[i+1])}-${Math.max(diamPath[i],diamPath[i+1])}`);
  let svg=`<svg class="gsvg" viewBox="0 0 ${W} ${H}" style="width:${W}px;height:${H}px">`;
  edges.forEach(e=>{
    const from=pos[e.u],to=pos[e.v];if(!from||!to)return;
    const key=`${Math.min(e.u,e.v)}-${Math.max(e.u,e.v)}`;
    const isDiam=diamEdgeSet.has(key);
    svg+=`<line x1="${from.x}" y1="${from.y}" x2="${to.x}" y2="${to.y}" stroke="${isDiam?'var(--gr)':'#2e3250'}" stroke-width="${isDiam?3:1.5}"/>`;
    if(e.w!==1){const mx=(from.x+to.x)/2,my=(from.y+to.y)/2;svg+=`<text x="${mx+5}" y="${my}" font-size="10" fill="var(--mu)">${e.w}</text>`;}
  });
  for(let i=1;i<=n;i++){
    const p=pos[i];if(!p)continue;
    const isCur=curNodes&&curNodes.includes(i);const isDiam=diamSet.has(i);
    const fill=isDiam?'rgba(86,207,178,.3)':isCur?'rgba(250,173,73,.35)':'var(--sf)';
    const stroke=isDiam?'var(--gr)':isCur?'#faad49':'var(--bd)';
    const sw=isDiam||isCur?2.5:1.5;
    svg+=`<circle cx="${p.x}" cy="${p.y}" r="16" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
    svg+=`<text x="${p.x}" y="${p.y+5}" text-anchor="middle" font-size="11" font-weight="bold" fill="${isDiam?'var(--gr)':isCur?'#faad49':'var(--tx)'}">${i}</text>`;
    if(distArr&&distArr[i]!==undefined)svg+=`<text x="${p.x}" y="${p.y+30}" text-anchor="middle" font-size="9" fill="var(--ac2)">${distArr[i]===Infinity?'':distArr[i]}</text>`;
  }
  if(phase)svg+=`<text x="10" y="18" font-size="11" fill="var(--mu)">${phase}</text>`;
  svg+='</svg>';
  document.getElementById('viz').innerHTML=svg;
}

document.getElementById('run-btn').onclick=function(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;document.getElementById('btn-play').textContent='▶ 自動';}
  steps.length=0;cur=-1;
  const n=Math.min(10,Math.max(2,parseInt(document.getElementById('n-in').value)||8));
  const edges=[];
  document.getElementById('edges').value.trim().split('\n').forEach(line=>{
    const p=line.trim().split(/\s+/);
    if(p.length>=2){const u=parseInt(p[0]),v=parseInt(p[1]),w=p[2]?parseInt(p[2]):1;if(u>=1&&u<=n&&v>=1&&v<=n){edges.push({u,v,w});edges.push({u:v,v:u,w});}}
  });
  const undirEdges=edges.filter(e=>e.u<e.v);
  const adj=Array.from({length:n+1},()=>[]);
  edges.forEach(e=>adj[e.u].push({v:e.v,w:e.w}));

  function bfs(src){
    const dist=new Array(n+1).fill(Infinity);const prev=new Array(n+1).fill(-1);
    dist[src]=0;const queue=[src];
    while(queue.length){
      const u=queue.shift();
      for(const{v,w}of adj[u]){if(dist[v]===Infinity){dist[v]=dist[u]+w;prev[v]=u;queue.push(v);}}
    }
    return{dist,prev};
  }

  steps.push({n,edges:undirEdges,adj,curNodes:[1],distArr:null,phase:'第一次 BFS（從任意節點=1出發）',diamPath:[],desc:`<b>第一次 BFS</b><br>從任意節點 1 出發，找到距離最遠的節點。`});
  const{dist:dist1}=bfs(1);
  let u=1;for(let i=1;i<=n;i++)if(dist1[i]>dist1[u])u=i;
  steps.push({n,edges:undirEdges,adj,curNodes:[u],distArr:dist1,phase:'第一次 BFS 結束',diamPath:[],desc:`<b>第一次 BFS 結束</b><br>從節點 1 出發，距離最遠的節點為 <b>${u}</b>（距離=${dist1[u]}）。<br>節點 ${u} 為直徑的一個端點。`});

  steps.push({n,edges:undirEdges,adj,curNodes:[u],distArr:null,phase:`第二次 BFS（從端點 ${u} 出發）`,diamPath:[],desc:`<b>第二次 BFS</b><br>從節點 ${u} 出發，找到直徑另一端點。`});
  const{dist:dist2,prev}=bfs(u);
  let v=1;for(let i=1;i<=n;i++)if(dist2[i]>dist2[v])v=i;
  steps.push({n,edges:undirEdges,adj,curNodes:[v],distArr:dist2,phase:`第二次 BFS 結束`,diamPath:[],desc:`<b>第二次 BFS 結束</b><br>距離最遠節點為 <b>${v}</b>（距離=${dist2[v]}）。<br>直徑長度 = <b>${dist2[v]}</b>`});
  
  // Traceback path
  const path=[];let x=v;while(x!==-1){path.unshift(x);x=prev[x];}
  steps.push({n,edges:undirEdges,adj,curNodes:[u,v],distArr:dist2,phase:'直徑路徑',diamPath:path,desc:`<b>樹的直徑 = ${dist2[v]}</b><br>端點：${u} → ${v}<br>路徑：${path.join(' → ')}`});
  goTo(0);
};
updateCtrl();
function randFill(){
  const n=5+Math.floor(Math.random()*5);
  document.getElementById('n-in').value=n;
  const perm=Array.from({length:n},(_,i)=>i+1).sort(()=>Math.random()-.5);
  const lines=[];
  for(let i=1;i<n;i++){const parent=perm[Math.floor(Math.random()*i)];lines.push(perm[i]+' '+parent+' '+(1+Math.floor(Math.random()*10)));}
  document.getElementById('edges').value=lines.join('\n');
}
document.getElementById('rand-btn').onclick=randFill;
function highlightPhase(ph){
  let phase=ph;
  if(!phase&&steps.length>0){
    if(cur===0)phase='init';
    else if(cur===steps.length-1)phase='done';
    else phase='process';
  }
  const MAP={init:['l0'],process:['l1','l2','l3','l4'],done:['l5']};
  const allIds=Object.values(MAP).flat();
  allIds.forEach(id=>{const el=document.getElementById(id);if(el){el.classList.remove('active','dim');}});
  if(!phase||!MAP[phase])return;
  const active=MAP[phase];
  allIds.forEach(id=>{const el=document.getElementById(id);if(el){if(active.includes(id))el.classList.add('active');else el.classList.add('dim');}});
}
</script>
</body></html>
